<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{FULL_NAME}} - Resume</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 10pt;
      line-height: 1.3;
      color: #000;
      background: #fff;
    }

    .resume {
      width: 100%;
      max-width: 7.5in;
      margin: 0 auto;
      padding: 0;
    }

    header {
      text-align: center;
      margin-bottom: 12px;
    }

    header h1 {
      font-size: 16pt;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    header .title {
      font-size: 10.5pt;
      font-weight: 600;
      margin-bottom: 6px;
    }

    header .contact {
      font-size: 9.5pt;
    }

    header .contact a {
      color: #000;
      text-decoration: none;
    }

    section {
      margin-bottom: 10px;
    }

    h2 {
      font-size: 10pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #000;
      padding-bottom: 1px;
      margin-bottom: 5px;
    }

    .summary {
      text-align: left;
    }

    .skill-group {
      margin-bottom: 2px;
    }

    .skill-group strong {
      font-weight: 700;
    }

    .job {
      margin-bottom: 8px;
    }

    .job-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 2px;
    }

    .job-title-line {
      font-weight: 700;
    }

    .job-meta {
      font-size: 9.5pt;
      white-space: nowrap;
      text-align: right;
    }

    ul {
      margin-left: 16px;
      padding-left: 0;
    }

    li {
      margin-bottom: 2px;
    }

    .education-item {
      margin-bottom: 2px;
    }

    .education-line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .education-degree {
      font-weight: 700;
    }

    @media print {
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>
  <div class="resume">
    {{CONTENT}}
  </div>
</body>
</html>
